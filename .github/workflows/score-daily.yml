name: score-daily

on:
  schedule:
    # 09:00 UTC daily -- one hour after asos-truth fires, so yesterday's
    # ASOS parquet is in. Vendor captures arrive later in the day via the
    # user's 10 AM ET scheduled task; those are picked up on subsequent
    # re-runs or the next day's scoring pass.
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "ASOS date to score (YYYY-MM-DD). Blank = yesterday UTC."
        required: false
        default: ""

concurrency:
  group: noaa-forecast
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Score forecasts
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python score_daily.py --date "${{ inputs.date }}"
          else
            python score_daily.py
          fi

      - name: Commit scores
        run: |
          git config user.name  "noaa-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scores/
          if git diff --cached --quiet; then
            echo "No score changes to commit."
            exit 0
          fi
          git commit -m "scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase --autostash
          git push
